name: Check skills up to date

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Weekly on Monday at 8am UTC

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest skills
        run: make build

      - name: Check for differences
        id: diff
        run: |
          if git diff --quiet skills/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ Skills are up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✗ Skills are out of date"
            git diff --stat skills/
          fi

      # On push/PR: just fail if skills are outdated
      - name: Fail if outdated
        if: github.event_name != 'schedule' && steps.diff.outputs.changed == 'true'
        run: |
          echo "Committed skills/ are out of date with suprsend/skills."
          echo "Run 'make build' locally and commit the updated skills."
          exit 1

      # On schedule: open a PR with the updated skills
      - name: Create pull request
        if: github.event_name == 'schedule' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update bundled skills from suprsend/skills"
          branch: automated/update-skills
          title: "Update bundled skills"
          body: |
            Automated update — the bundled `skills/` directory is out of date with the upstream [`suprsend/skills`](https://github.com/suprsend/skills) repo.

            Generated by the weekly skills check workflow.
